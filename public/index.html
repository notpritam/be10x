<!doctype html>
<!-- ABOUTME: The Git for Agents web board — buildless Kanban + detail panel over the HTTP API. -->
<!-- ABOUTME: Session-cookie auth; talks to /api/*. Design language inherited from the plan overview. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Git for Agents</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0c0d11;--bg2:#101117;--panel:#15161d;--panel2:#191b23;--line:#24262f;--line2:#2e3140;
    --ink:#e7e8ec;--mut:#9a9ca6;--dim:#6c6e79;--iris:#8b7dff;--iris-dim:#3a3560;--emerald:#34d399;
    --coral:#fb7185;--amber:#fbbf24;--sky:#56b6ff;
    --disp:'Space Grotesk',system-ui,sans-serif;--body:'IBM Plex Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14px}
  a,button{font-family:inherit}
  .mono{font-family:var(--mono)}
  header{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:5}
  header .brand{font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:-.01em}
  header .brand span{color:var(--iris)}
  header .sp{flex:1}
  header .who{color:var(--mut);font-size:13px}
  button{cursor:pointer;border:1px solid var(--line2);background:var(--panel2);color:var(--ink);border-radius:8px;padding:7px 12px;font-size:13px}
  button:hover{border-color:var(--iris-dim)}
  button.pri{border-color:var(--iris-dim);background:linear-gradient(180deg,#241f45,#1a1730);color:#cdc6ff}
  input,select,textarea{font-family:inherit;font-size:13px;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;color:var(--ink);padding:8px 10px}
  input::placeholder,textarea::placeholder{color:var(--dim)}
  /* auth */
  .auth{max-width:360px;margin:12vh auto;padding:26px;background:var(--panel);border:1px solid var(--line);border-radius:16px}
  .auth h1{font-family:var(--disp);font-size:22px;margin:0 0 4px}
  .auth p{color:var(--mut);margin:0 0 18px;font-size:13px}
  .auth .row{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
  .auth .tabs{display:flex;gap:6px;margin-bottom:14px}
  .auth .tabs button{flex:1}
  .auth .tabs button.on{border-color:var(--iris);color:#cdc6ff}
  .err{color:var(--coral);font-size:12.5px;min-height:16px;margin-top:4px}
  /* new task bar */
  .bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:12px 20px;border-bottom:1px solid var(--line);background:var(--bg)}
  .bar input,.bar select{min-width:0}
  .bar .title{flex:1;min-width:160px}
  /* board */
  .board{display:flex;gap:12px;overflow-x:auto;padding:16px 20px 30px;align-items:flex-start}
  .lane{flex:0 0 230px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:10px}
  .lane h2{font-family:var(--disp);font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin:2px 4px 10px;display:flex;justify-content:space-between}
  .lane h2 .n{color:var(--dim)}
  .card{background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:10px 11px;margin-bottom:8px;cursor:pointer}
  .card:hover{border-color:var(--iris-dim)}
  .card .id{font-family:var(--mono);font-size:11px;color:var(--dim)}
  .card .t{font-weight:600;font-size:13.5px;margin:3px 0 6px;line-height:1.3}
  .card .meta{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:5px;border:1px solid var(--line2);color:var(--mut)}
  .chip.sev-high{border-color:#5b2530;color:var(--coral)}
  .chip.type{color:#b9a8ff;border-color:var(--iris-dim)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  /* drawer */
  .scrim{position:fixed;inset:0;background:#0009;display:none}
  .scrim.on{display:block}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(680px,96vw);background:var(--panel);border-left:1px solid var(--line);transform:translateX(100%);transition:transform .18s;overflow-y:auto;z-index:20}
  .drawer.on{transform:none}
  .drawer .dh{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:10px}
  .drawer .dh .x{margin-left:auto}
  .drawer h3{font-family:var(--disp);font-size:18px;margin:2px 0 6px}
  .sec{padding:16px 22px;border-bottom:1px solid var(--line)}
  .sec .k{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:8px}
  .kv{display:grid;grid-template-columns:110px 1fr;gap:6px 10px;font-size:13px}
  .kv .kk{color:var(--dim);font-family:var(--mono);font-size:11px;padding-top:2px}
  .btns{display:flex;flex-wrap:wrap;gap:7px}
  .feed{display:flex;flex-direction:column;gap:7px;max-height:230px;overflow-y:auto}
  .ev{font-size:12.5px;color:var(--mut);border-left:2px solid var(--line2);padding:2px 0 2px 10px}
  .ev b{color:var(--ink);font-weight:600}
  .im{border:1px solid var(--amber);border-radius:12px;padding:14px;background:#1c1810}
  .im .q{font-size:14px;color:#e7e3d6;margin-bottom:10px}
  .im .choices{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
  .qc{border:1px solid var(--line2);background:var(--panel)}
  .qc.sel{border-color:var(--amber);color:#ffe08a;background:#2a2412}
  .im .custom{display:flex;gap:7px}
  .im .custom input{flex:1}
  .status-pill{font-family:var(--mono);font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid var(--line2)}
  .hide{display:none}
</style>
</head>
<body>
<div id="app"></div>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"></aside>

<script>
const LANES = ['backlog','researching','plan_review','ready_to_work','in_progress','needs_input','verifying','done'];
const LANE_LABEL = {backlog:'Backlog',researching:'Researching',plan_review:'Plan review',ready_to_work:'Ready to work',in_progress:'In progress',needs_input:'Needs input',verifying:'Verifying',done:'Done'};
const NEXT = {
  backlog:['researching','ready_to_work','not_a_bug','wont_fix','blocked'],
  researching:['plan_review','blocked'],
  plan_review:['researching','ready_to_work','not_a_bug','wont_fix','blocked'],
  ready_to_work:['in_progress','plan_review','blocked'],
  in_progress:['needs_input','verifying','plan_review','blocked'],
  needs_input:['in_progress','blocked'],
  verifying:['done','in_progress','plan_review'],
  blocked:['backlog','researching','plan_review','ready_to_work','in_progress'],
  done:[],not_a_bug:[],wont_fix:[],
};
const DOT = {backlog:'#6c6e79',researching:'#8b7dff',plan_review:'#fbbf24',ready_to_work:'#34d399',in_progress:'#8b7dff',needs_input:'#fbbf24',verifying:'#56b6ff',done:'#34d399'};
let ME=null, TASKS=[], OPENID=null;

async function api(method, path, body){
  const r = await fetch(path,{method,headers:{'Content-Type':'application/json'},body:body===undefined?undefined:JSON.stringify(body)});
  const j = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(j.error||('HTTP '+r.status));
  return j;
}
const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function boot(){
  try{ const me=await api('GET','/api/me'); ME=me.user; renderApp(); loadBoard(); }
  catch{ renderAuth(); }
}

function renderAuth(){
  let mode='login';
  const el=document.getElementById('app');
  const draw=()=>{ el.innerHTML=`
    <div class="auth">
      <h1>Git for Agents</h1>
      <p>Sign in to your board.</p>
      <div class="tabs">
        <button id="t-login" class="${mode==='login'?'on':''}">Log in</button>
        <button id="t-signup" class="${mode==='signup'?'on':''}">Sign up</button>
      </div>
      ${mode==='signup'?'<div class="row"><input id="dn" placeholder="Display name"/></div>':''}
      <div class="row"><input id="em" placeholder="Email" autocomplete="username"/></div>
      <div class="row"><input id="pw" type="password" placeholder="Password" autocomplete="current-password"/></div>
      <button class="pri" id="go" style="width:100%">${mode==='login'?'Log in':'Create account'}</button>
      <div class="err" id="err"></div>
    </div>`;
    document.getElementById('t-login').onclick=()=>{mode='login';draw()};
    document.getElementById('t-signup').onclick=()=>{mode='signup';draw()};
    document.getElementById('go').onclick=submit;
    el.querySelectorAll('input').forEach(i=>i.addEventListener('keydown',e=>{if(e.key==='Enter')submit()}));
  };
  async function submit(){
    const email=document.getElementById('em').value.trim();
    const password=document.getElementById('pw').value;
    const displayName=(document.getElementById('dn')||{}).value;
    try{
      if(mode==='signup') await api('POST','/api/auth/signup',{email,displayName,password});
      else await api('POST','/api/auth/login',{email,password});
      boot();
    }catch(e){ document.getElementById('err').textContent = e.message==='BAD_CREDENTIALS'?'Wrong email or password.':e.message==='EMAIL_TAKEN'?'That email is taken.':e.message; }
  }
  draw();
}

function renderApp(){
  document.getElementById('app').innerHTML=`
    <header>
      <div class="brand">Git for <span>Agents</span></div>
      <div class="sp"></div>
      <div class="who">${esc(ME.displayName)} · ${esc(ME.email)}</div>
      <button id="logout">Log out</button>
    </header>
    <div class="bar">
      <select id="nt-type"><option value="general">general</option><option value="code-issue">code-issue</option></select>
      <select id="nt-scope"><option value="personal">personal</option><option value="team">team</option><option value="project">project</option></select>
      <input class="title" id="nt-title" placeholder="New task title…"/>
      <input class="title" id="nt-detail" placeholder="Summary / symptom…"/>
      <button class="pri" id="nt-add">Add task</button>
    </div>
    <div class="board" id="board"></div>`;
  document.getElementById('logout').onclick=async()=>{await api('POST','/api/auth/logout');location.reload()};
  document.getElementById('nt-add').onclick=addTask;
}

async function addTask(){
  const type=document.getElementById('nt-type').value;
  const scope=document.getElementById('nt-scope').value;
  const title=document.getElementById('nt-title').value.trim();
  const detail=document.getElementById('nt-detail').value.trim();
  if(!title||!detail) return;
  const content = type==='code-issue'?{symptom:detail}:{summary:detail};
  try{ await api('POST','/api/tasks',{type,scope,title,content}); document.getElementById('nt-title').value='';document.getElementById('nt-detail').value=''; loadBoard(); }
  catch(e){ alert(e.message); }
}

async function loadBoard(){
  const {tasks}=await api('GET','/api/tasks');
  TASKS=tasks; renderBoard();
  if(OPENID) openDrawer(OPENID);
}

function renderBoard(){
  const byLane=Object.fromEntries(LANES.map(l=>[l,[]]));
  for(const t of TASKS){ (byLane[t.status]||(byLane[t.status]=[])).push(t); }
  document.getElementById('board').innerHTML = LANES.map(l=>`
    <div class="lane">
      <h2>${LANE_LABEL[l]} <span class="n">${(byLane[l]||[]).length}</span></h2>
      ${(byLane[l]||[]).map(cardHTML).join('')}
    </div>`).join('');
  document.querySelectorAll('.card').forEach(c=>c.onclick=()=>openDrawer(c.dataset.id));
}
function cardHTML(t){
  return `<div class="card" data-id="${t.id}">
    <div class="id">${esc(t.humanId)}</div>
    <div class="t">${esc(t.title)}</div>
    <div class="meta">
      <span class="chip type">${esc(t.type)}</span>
      <span class="chip ${t.severity==='high'?'sev-high':''}">${esc(t.severity)}</span>
      <span class="dot" style="background:${DOT[t.status]||'#6c6e79'}"></span>
    </div></div>`;
}

async function openDrawer(id){
  OPENID=id;
  const {task}=await api('GET','/api/tasks/'+id);
  const {events}=await api('GET','/api/tasks/'+id+'/events');
  let input=null;
  if(task.status==='needs_input'){ input=(await api('GET','/api/tasks/'+id+'/input')).inputRequest; }
  const d=document.getElementById('drawer');
  d.innerHTML=drawerHTML(task,events,input);
  d.classList.add('on'); document.getElementById('scrim').classList.add('on');
  wireDrawer(task,input);
}
function closeDrawer(){ OPENID=null; document.getElementById('drawer').classList.remove('on'); document.getElementById('scrim').classList.remove('on'); }

function drawerHTML(t,events,input){
  const content=Object.entries(t.content||{}).map(([k,v])=>`<div class="kk">${esc(k)}</div><div>${esc(typeof v==='object'?JSON.stringify(v):v)}</div>`).join('');
  const nexts=(NEXT[t.status]||[]);
  return `
    <div class="dh">
      <div>
        <div class="mono" style="color:var(--dim);font-size:12px">${esc(t.humanId)} · ${esc(t.type)}</div>
        <h3>${esc(t.title)}</h3>
        <span class="status-pill" style="border-color:${DOT[t.status]}55;color:${DOT[t.status]}">${esc(t.status)}</span>
      </div>
      <button class="x" onclick="closeDrawer()">✕</button>
    </div>
    ${input?`<div class="sec"><div class="k">⏸ Needs your input</div>
      <div class="im">
        <div class="q">${esc(input.question)}</div>
        ${input.choices?`<div class="choices">${input.choices.map(c=>`<button class="qc" data-choice="${esc(c)}">${esc(c)}</button>`).join('')}</div>`:''}
        ${input.allowCustom?`<div class="custom"><input id="im-custom" placeholder="Custom answer…"/><button class="pri" id="im-send">Send &amp; continue</button></div>`:''}
      </div></div>`:''}
    <div class="sec"><div class="k">Content</div><div class="kv">${content||'<div style="color:var(--dim)">—</div>'}</div></div>
    ${t.plan?`<div class="sec"><div class="k">Plan</div><div class="mono" style="font-size:12px;white-space:pre-wrap;color:#cdd">${esc(JSON.stringify(t.plan,null,2))}</div></div>`:''}
    ${t.agent?`<div class="sec"><div class="k">Agent</div><div style="font-size:13px"><b>${esc(t.agent.step||'')}</b><br><span style="color:var(--mut)">${esc(t.agent.message||'')}</span></div></div>`:''}
    <div class="sec"><div class="k">Move</div><div class="btns" id="moves">
      ${nexts.map(s=>`<button data-to="${s}">${s.replace(/_/g,' ')}</button>`).join('')||'<span style="color:var(--dim)">terminal</span>'}
    </div></div>
    ${t.status==='plan_review'?`<div class="sec"><div class="k">Review</div><div class="btns">
      <button class="pri" id="rv-approve">Approve → ready</button>
      <button id="rv-changes">Request changes</button></div></div>`:''}
    <div class="sec"><div class="k">Activity</div><div class="feed">${events.slice().reverse().map(evHTML).join('')||'<span style="color:var(--dim)">—</span>'}</div></div>`;
}
function evHTML(e){
  let d='';
  if(e.kind==='status') d=`<b>${e.payload.from}</b> → <b>${e.payload.to}</b>`;
  else if(e.kind==='review') d=`review: <b>${e.payload.verdict}</b>`;
  else if(e.kind==='input_request') d=`asked: ${esc(e.payload.question||'')}`;
  else if(e.kind==='input_answer') d=`answered: ${esc(e.payload.answer||'')}`;
  else d=e.kind;
  return `<div class="ev"><b>${esc(e.actor).slice(0,8)}</b> · ${d}</div>`;
}

function wireDrawer(t,input){
  document.querySelectorAll('#moves button').forEach(b=>b.onclick=async()=>{
    try{ await api('POST','/api/tasks/'+t.id+'/transition',{to:b.dataset.to}); loadBoard(); }catch(e){ alert(e.message); }
  });
  const ap=document.getElementById('rv-approve'); if(ap) ap.onclick=()=>submitReview(t.id,'approved');
  const ch=document.getElementById('rv-changes'); if(ch) ch.onclick=()=>submitReview(t.id,'changes_requested');
  if(input){
    let chosen=null;
    document.querySelectorAll('.qc').forEach(q=>q.onclick=()=>{ chosen=q.dataset.choice; document.querySelectorAll('.qc').forEach(x=>x.classList.remove('sel')); q.classList.add('sel'); });
    const send=document.getElementById('im-send');
    if(send) send.onclick=async()=>{
      const custom=(document.getElementById('im-custom')||{}).value;
      const answer=custom||chosen; if(!answer) return;
      try{ await api('POST','/api/input/'+input.id+'/answer',{answer}); loadBoard(); }catch(e){ alert(e.message); }
    };
  }
}
async function submitReview(id,verdict){
  try{ await api('POST','/api/tasks/'+id+'/review/submit',{verdict,comment:''}); loadBoard(); }catch(e){ alert(e.message); }
}

boot();
</script>
</body>
</html>
